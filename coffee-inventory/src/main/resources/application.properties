
spring.application.name=coffee-inventory



server.port=8082

spring.datasource.url=jdbc:mysql://localhost:3306/coffee?useSSL=false
spring.datasource.username=root
spring.datasource.password=root1
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# External Coffee Shop Database API Configuration
coffee-shop.api.base-url=http://localhost:9000
coffee-shop.api.timeout=5000
